<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <title>Cerrar sesión</title>
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- HEADER -->
  <header class="bg-body-tertiary sticky-top shadow-sm mb-0">
    <nav class="navbar navbar-expand-lg bg-body-tertiary container">
      <div class="container-fluid">

        <a class="navbar-brand" href="../index.html">
          <img src="../assets/images/logo.webp" alt="logo de la compañia" width="90">
        </a>

        <div class="ms-auto">
          <a class="btn btn-outline-dark" href="../index.html">
            <i class="fa-solid fa-house me-1"></i>
            Volver al inicio
          </a>
        </div>

      </div>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center">

    <div class="card p-5 text-center col-12 col-md-6 col-lg-4 shadow-sm"
      style="--bs-card-bg: #f2ede7">

      <div class="mb-3">
        <i class="fa-solid fa-right-from-bracket fa-3x text-danger"></i>
      </div>

      <h2 class="fw-bold">Cerrar sesión</h2>

      <p class="text-muted mb-4">
        ¿Estás seguro que deseas salir de tu cuenta?
      </p>

      <div class="d-grid gap-2">

        <a href="../index.html" class="btn btn-danger">
          <i class="fa-solid fa-right-from-bracket me-2"></i>
          Sí, cerrar sesión
        </a>

        <a href="../dashboards/user.html" class="btn btn-outline-secondary">
          Cancelar
        </a>

      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="bg-dark text-light py-3 mt-auto text-center">
    <small style="color: var(--bs-warning-bg-subtle);">
      &copy; 2026 SportLife Club
    </small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
